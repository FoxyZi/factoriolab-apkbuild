name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: |
          npx cap init FactorioLab com.factoriolab.mobile --web-dir=dist/factoriolab/browser
          npx cap add android
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Find APK
        run: |
          echo "Searching for APK files..."
          find android -name "*.apk" -type f
          mkdir -p apk-output
          cp $(find android -name "*.apk" -type f | head -n 1) apk-output/factoriolab-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: factoriolab-debug-apk
          path: apk-output/factoriolab-debug.apk
          if-no-files-found: error
